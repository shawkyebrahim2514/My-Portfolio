<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1200px;
        height: 630px;
      }
      body {
        position: relative;
        overflow: hidden;
        background:
          radial-gradient(
            60% 80% at 12% 8%,
            rgba(240, 152, 90, 0.35),
            transparent 60%
          ),
          radial-gradient(
            55% 75% at 92% 22%,
            rgba(236, 79, 140, 0.35),
            transparent 60%
          ),
          radial-gradient(
            70% 90% at 78% 100%,
            rgba(139, 92, 246, 0.32),
            transparent 60%
          ),
          #18171c;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          'Segoe UI',
          Roboto,
          Arial,
          sans-serif;
        color: #f5f3ef;
        display: flex;
        align-items: center;
        gap: 64px;
        padding: 0 88px;
      }
      .content {
        display: flex;
        flex-direction: column;
        gap: 22px;
        max-width: 680px;
      }
      .eyebrow {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 26px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #ec4f8c;
      }
      .dot {
        width: 14px;
        height: 14px;
        border-radius: 999px;
        background: #ec4f8c;
      }
      .name {
        font-size: 104px;
        line-height: 1;
        font-weight: 800;
        letter-spacing: -0.03em;
        background: linear-gradient(115deg, #f0985a, #ec4f8c 48%, #a78bfa);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .role {
        font-size: 40px;
        font-weight: 600;
        color: #f5f3ef;
      }
      .sub {
        font-size: 28px;
        color: #b9b4ac;
      }
      .foot {
        margin-top: 14px;
        font-size: 24px;
        font-family: ui-monospace, 'SFMono-Regular', Menlo, monospace;
        color: #8d8880;
      }
      .foot b {
        color: #f5f3ef;
      }
      .avatar-wrap {
        flex-shrink: 0;
        padding: 7px;
        border-radius: 999px;
        background: linear-gradient(135deg, #f0985a, #ec4f8c 48%, #a78bfa);
      }
      .avatar {
        display: block;
        width: 300px;
        height: 300px;
        border-radius: 999px;
        object-fit: cover;
        border: 8px solid #18171c;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <div class="eyebrow"><span class="dot"></span>As-salamu alaykum</div>
      <div class="name">Shawky Ebrahim</div>
      <div class="role">Software Engineer @ Microsoft Egypt</div>
      <div class="sub">
        Cross-platform development · Performance · Clarity Flutter SDK
      </div>
      <div class="foot">shawky<b>.dev</b></div>
    </div>
    <div class="avatar-wrap">
      <img
        class="avatar"
        src="https://avatars.githubusercontent.com/shawkyebrahim2514"
        alt="Shawky Ebrahim"
      />
    </div>
  </body>
</html>
